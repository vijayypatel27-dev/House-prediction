data:
  raw_path: data/raw/house_prices.csv
  processed_train_path: data/processed/train.csv
  processed_test_path: data/processed/test.csv
  test_size: 0.2
  random_state: 42

features:
  target: price
  numeric:
    - area
    - bedrooms
    - bathrooms
    - stories
    - parking
    - age
  categorical:
    - mainroad
    - guestroom
    - basement
    - hotwaterheating
    - airconditioning
    - prefarea
    - furnishingstatus
    - city_zone

training:
  experiment_name: house-price-prediction
  model_dir: artifacts/models
  preprocessor_path: artifacts/preprocessor.joblib
  metrics_path: artifacts/metrics.json
  best_model_path: artifacts/best_model.joblib
  cv_folds: 3
  scoring: neg_root_mean_squared_error
  random_state: 42
  models:
    linear_regression:
      enabled: true
      params: {}
    random_forest:
      enabled: true
      param_grid:
        n_estimators: [80, 150]
        max_depth: [8, 14, null]
        min_samples_split: [2, 5]
    xgboost:
      enabled: true
      param_grid:
        n_estimators: [100, 180]
        max_depth: [3, 5]
        learning_rate: [0.05, 0.1]
