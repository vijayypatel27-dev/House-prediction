<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>House Price Predictor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">MLOps Demo</p>
        <h1>House Price Predictor</h1>
        <p class="subcopy">Estimate sale value from property size, rooms, amenities, furnishing, and location signals.</p>
      </div>
      {% if prediction %}
        <div class="result">
          <span>Predicted price</span>
          <strong>₹ {{ prediction }}</strong>
        </div>
      {% endif %}
    </section>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post" class="form-grid">
      <label>Area (sq ft)<input name="area" type="number" min="300" value="6500" required></label>
      <label>Bedrooms<input name="bedrooms" type="number" min="1" value="3" required></label>
      <label>Bathrooms<input name="bathrooms" type="number" min="1" value="2" required></label>
      <label>Stories<input name="stories" type="number" min="1" value="2" required></label>
      <label>Parking<input name="parking" type="number" min="0" value="1" required></label>
      <label>Property age<input name="age" type="number" min="0" value="10" required></label>

      <label>Main road<select name="mainroad"><option>yes</option><option>no</option></select></label>
      <label>Guest room<select name="guestroom"><option>no</option><option>yes</option></select></label>
      <label>Basement<select name="basement"><option>yes</option><option>no</option></select></label>
      <label>Hot water heating<select name="hotwaterheating"><option>no</option><option>yes</option></select></label>
      <label>Air conditioning<select name="airconditioning"><option>yes</option><option>no</option></select></label>
      <label>Preferred area<select name="prefarea"><option>yes</option><option>no</option></select></label>
      <label>Furnishing<select name="furnishingstatus"><option>semi-furnished</option><option>furnished</option><option>unfurnished</option></select></label>
      <label>City zone<select name="city_zone"><option>suburban</option><option>central</option><option>outer</option></select></label>

      <button type="submit">Predict Price</button>
    </form>
  </main>
</body>
</html>
